<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — DriveNow Vehicle Rental</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/signup.css" />
</head>
<body class="signup-page">
  <div class="signup-container">
    <div class="signup-box">
      <div class="signup-header">
        <div class="signup-logo">🚗 DriveNow</div>
        <h1>Create Account</h1>
        <p class="signup-subtitle">Join our vehicle rental platform</p>
      </div>

      <form id="signup-form" class="signup-form">
        <div class="form-group">
          <label for="full-name">Full Name</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input
              type="text"
              id="full-name"
              name="full_name"
              placeholder="Enter your full name"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <span class="input-icon">👥</span>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Choose a username"
              required
            />
            <span class="username-hint">Minimum 3 characters</span>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔐</span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Create a password"
              required
            />
            <button type="button" class="toggle-password" id="toggle-password">
              👁️
            </button>
            <span class="password-hint">Minimum 6 characters</span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔐</span>
            <input
              type="password"
              id="confirm-password"
              name="confirm_password"
              placeholder="Confirm your password"
              required
            />
            <button type="button" class="toggle-password" id="toggle-confirm-password">
              👁️
            </button>
          </div>
        </div>

        <div class="form-group checkbox">
          <input type="checkbox" id="agree-terms" name="agree_terms" required />
          <label for="agree-terms">I agree to the Terms and Conditions</label>
        </div>

        <button type="submit" class="btn-signup">Create Account</button>

        <div id="signup-error" class="error-message" style="display: none;"></div>
        <div id="signup-success" class="success-message" style="display: none;"></div>
      </form>

      <div class="signup-footer">
        <p>
          Already have an account?
          <a href="login.html" class="link">Sign in</a>
        </p>
      </div>
    </div>

    <div class="signup-background">
      <div class="bg-decoration">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
      </div>
    </div>
  </div>

  <script src="js/signup.js"></script>
</body>
</html>
