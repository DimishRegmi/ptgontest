<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — DriveNow Vehicle Rental</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <div class="login-logo">🚗 DriveNow</div>
        <h1>Welcome Back</h1>
        <p class="login-subtitle">Sign in to access your vehicle rental dashboard</p>
      </div>

      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="username">Email or Username</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your email or username"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔐</span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />
            <button type="button" class="toggle-password" id="toggle-password">
              👁️
            </button>
          </div>
        </div>

        <div class="form-group checkbox">
          <input type="checkbox" id="remember-me" name="remember" />
          <label for="remember-me">Remember me</label>
        </div>

        <button type="submit" class="btn-login">Sign In</button>

        <div id="login-error" class="error-message" style="display: none;"></div>
        <div id="login-success" class="success-message" style="display: none;"></div>
      </form>

      <div class="login-footer">
        <p>
          Don't have an account?
          <a href="#" id="signup-link" class="link">Sign up</a>
        </p>
        <p>
          <a href="#" class="link">Forgot password?</a>
        </p>
      </div>
    </div>

    <div class="login-background">
      <div class="bg-decoration">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
